<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiša pod lipo — Apartma Lipa</title>
    <meta name="description" content="Apartma Lipa — Vodič za goste · Nova Gora nad Slovensko Bistrico">
    <style>
        :root {
            --green-dark: #1b4332;
            --green-mid: #2d6a4f;
            --green-accent: #40916c;
            --green-light: #74c69d;
            --green-pale: #d8f3dc;
            --bg: #f4f1eb;
            --card: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --text-muted: #b2bec3;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.07);
            --shadow-hover: 0 6px 24px rgba(0,0,0,0.13);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

        .lang-bar { background: var(--green-dark); padding: 10px 24px; display: flex; justify-content: flex-end; align-items: center; gap: 6px; }
        .lang-bar span { color: rgba(255,255,255,0.45); font-size: 13px; margin-right: 6px; }
        .lang-btn { background: transparent; border: 1.5px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; letter-spacing: 0.4px; transition: all 0.2s; }
        .lang-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.45); }
        .lang-btn.active { background: var(--green-light); border-color: var(--green-light); color: var(--green-dark); }

        .hero { background: linear-gradient(160deg, var(--green-dark) 0%, var(--green-mid) 55%, var(--green-accent) 100%); color: white; padding: 72px 24px 90px; text-align: center; position: relative; overflow: hidden; }
        .hero::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 44px; background: var(--bg); clip-path: ellipse(56% 100% at 50% 100%); }
        .hero-logo { font-size: 58px; display: block; margin-bottom: 20px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25)); }
        .hero h1 { font-size: clamp(26px, 5vw, 44px); font-weight: 800; letter-spacing: -0.5px; margin-bottom: 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .hero-subtitle { font-size: clamp(14px, 2.5vw, 17px); opacity: 0.82; max-width: 500px; margin: 0 auto; }

        nav { background: white; position: sticky; top: 0; z-index: 200; display: flex; justify-content: center; gap: 4px; padding: 10px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex-wrap: wrap; }
        nav a { color: var(--text-light); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.18s; white-space: nowrap; }
        nav a:hover { background: var(--green-pale); color: var(--green-dark); }

        main { max-width: 920px; margin: 0 auto; padding: 48px 20px 64px; }
        section { margin-bottom: 64px; }

        .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid var(--green-pale); }
        .section-icon { width: 50px; height: 50px; background: var(--green-pale); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        h2 { font-size: 26px; font-weight: 700; color: var(--green-dark); letter-spacing: -0.3px; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; margin-bottom: 12px; }
        .info-box { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); text-align: center; }
        .info-box .i-icon { font-size: 32px; margin-bottom: 10px; }
        .info-box .i-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; }
        .info-box .i-value { font-size: 19px; font-weight: 700; color: var(--text); margin-top: 4px; }

        .parking-note { background: var(--green-pale); border-radius: 10px; padding: 13px 17px; font-size: 14px; color: var(--green-dark); margin: 10px 0 20px; line-height: 1.65; }

        .wifi-box { background: white; border-radius: var(--radius); padding: 22px 26px; box-shadow: var(--shadow); margin-bottom: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .wifi-icon { font-size: 36px; flex-shrink: 0; }
        .wifi-details { flex: 1; min-width: 200px; }
        .wifi-row { display: flex; align-items: baseline; gap: 10px; margin: 5px 0; }
        .wlabel { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); min-width: 88px; font-weight: 600; }
        .wvalue { font-size: 16px; font-weight: 700; color: var(--green-dark); font-family: 'Courier New', monospace; }

        .sub-header { display: flex; align-items: center; gap: 10px; margin: 28px 0 14px; }
        .sub-icon { width: 36px; height: 36px; background: var(--green-pale); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
        .sub-header h3 { font-size: 18px; font-weight: 700; color: var(--green-dark); }

        .rules-list { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .rule-item { display: flex; align-items: flex-start; gap: 14px; padding: 15px 22px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
        .rule-item:last-child { border-bottom: none; }
        .rule-item:hover { background: #fafafa; }
        .rule-emoji { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .rule-text { font-size: 15px; color: var(--text); }

        /* Sauna */
        .sauna-box { background: white; border-radius: var(--radius); padding: 22px 26px; box-shadow: var(--shadow); margin-top: 6px; border-left: 4px solid #e67e22; }
        .sauna-box h4 { font-size: 15px; font-weight: 700; color: #c0392b; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .sauna-steps { list-style: none; padding: 0; }
        .sauna-steps li { display: flex; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 14.5px; color: var(--text-light); line-height: 1.6; }
        .sauna-steps li:last-child { border-bottom: none; }
        .snum { width: 24px; height: 24px; background: #e67e22; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }

        /* Season header */
        .season-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; font-size: 14px; font-weight: 700; color: var(--green-mid); text-transform: uppercase; letter-spacing: 0.7px; }
        .season-header::before { content: ''; display: block; width: 3px; height: 18px; background: var(--green-light); border-radius: 2px; }

        /* Cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .card { background: var(--card); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); border-top: 3px solid var(--green-light); transition: box-shadow 0.2s, transform 0.2s; }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .card-icon { font-size: 28px; margin-bottom: 12px; display: block; }
        .card h3 { font-size: 16px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
        .card h3 a { color: var(--green-dark); text-decoration: none; }
        .card h3 a:hover { color: var(--green-accent); text-decoration: underline; }
        .card p, .card li { font-size: 14.5px; color: var(--text-light); line-height: 1.7; }
        .card small { font-size: 13px; color: var(--text-muted); }
        .card a { color: var(--green-accent); text-decoration: none; font-weight: 500; }
        .card a:hover { text-decoration: underline; }
        .card ul { list-style: none; padding: 0; }
        .card ul li { padding: 3px 0 3px 18px; position: relative; }
        .card ul li::before { content: '\2192'; position: absolute; left: 0; color: var(--green-light); font-weight: bold; }
        .card .tag { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; background: var(--green-pale); color: var(--green-dark); padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; }
        .card-link { cursor: pointer; }
        .card-link h3 span { transition: opacity 0.2s; }
        .emg-card.green .emg-number { color: #27ae60; }
        a.emg-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; }
        a.emg-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

        /* Wine cards */
        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .wine-card { background: var(--card); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); border-top: 3px solid #C8A951; transition: box-shadow 0.2s, transform 0.2s; }
        .wine-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .wine-card .wc-icon { font-size: 26px; margin-bottom: 10px; display: block; }
        .wine-card .wc-producer { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 3px; }
        .wine-card h3 { font-size: 15px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
        .wine-card p { font-size: 14px; color: var(--text-light); line-height: 1.65; }
        .wine-card .wc-price { display: inline-block; background: #C8A951; color: white; font-weight: 700; font-size: 14px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
        .wine-card .wc-eco { display: inline-block; font-size: 11px; font-weight: 600; background: var(--green-pale); color: var(--green-dark); padding: 3px 8px; border-radius: 20px; margin-left: 6px; margin-bottom: 8px; }
        .wine-card .wc-note { font-size: 13px; color: var(--green-accent); font-style: italic; margin-top: 7px; }

        /* Service cards */
        .service-card { background: var(--card); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); border-top: 3px solid var(--green-accent); transition: box-shadow 0.2s, transform 0.2s; }
        .service-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .service-card .card-icon { font-size: 28px; margin-bottom: 12px; display: block; }
        .service-card h3 { font-size: 16px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
        .service-card p { font-size: 14.5px; color: var(--text-light); line-height: 1.7; }
        .service-card .on-request { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: var(--green-pale); color: var(--green-accent); padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; }

        /* Emergency */
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .emg-card { background: white; border-radius: var(--radius); padding: 20px 16px; text-align: center; box-shadow: var(--shadow); }
        .emg-card .emg-icon { font-size: 28px; margin-bottom: 8px; }
        .emg-card .emg-number { font-size: 30px; font-weight: 800; letter-spacing: 1px; }
        .emg-card .emg-desc { font-size: 13px; color: var(--text-light); margin-top: 4px; font-weight: 500; }
        .emg-card.red .emg-number { color: #e74c3c; }
        .emg-card.blue .emg-number { color: #2980b9; }
        .emg-card.orange .emg-number { color: #e67e22; }
        .emg-card.teal .emg-number { color: var(--green-accent); }

        .contact-box { background: var(--green-pale); border-radius: var(--radius); padding: 24px 28px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-top: 24px; }
        .contact-icon { font-size: 40px; flex-shrink: 0; }
        .contact-info h3 { font-size: 17px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
        .contact-info p { font-size: 15px; color: var(--text-light); }
        .contact-info a { color: var(--green-accent); font-weight: 600; text-decoration: none; }
        .contact-info a:hover { text-decoration: underline; }

        footer { background: var(--green-dark); color: rgba(255,255,255,0.6); text-align: center; padding: 40px 24px; font-size: 14px; line-height: 2; }
        footer strong { color: rgba(255,255,255,0.9); }
        footer a { color: var(--green-light); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .hero { padding: 56px 20px 76px; }
            main { padding: 36px 16px 48px; }
            nav a { padding: 7px 10px; font-size: 12px; }
            h2 { font-size: 22px; }
            .wifi-box { flex-direction: column; gap: 12px; }
        }
    </style>
</head>

var T = {
    en: {

function renderCards(id, items) {
    if (!items) return;
    document.getElementById(id).innerHTML = items.map(function(c) {
        var titleHtml = c.url
            ? '<h3>' + c.title + ' <span style="font-size:12px;opacity:0.6">&#8599;</span></h3>'
            : '<h3>' + c.title + '</h3>';
        var inner =
            '<span class="card-icon">' + c.icon + '</span>' +
            (c.tag ? '<span class="tag">' + c.tag + '</span>' : '') +
            titleHtml +
            (c.text ? '<p>' + c.text + '</p>' : '') +
            (c.list ? '<ul>' + c.list.map(function(l){ return '<li>' + l + '</li>'; }).join('') + '</ul>' : '');
        if (c.url) {
            return '<div class="card card-link" data-href="' + c.url + '">' + inner + '</div>';
        }
        return '<div class="card">' + inner + '</div>';
    }).join('');
}

// Whole-card click → open its link in a new tab. Clicks on inner links (phone,
// website) keep working because we bail out when the click lands on an <a>.
document.addEventListener('click', function(e) {
    var card = e.target.closest('.card-link');
    if (!card || e.target.closest('a')) return;
    window.open(card.dataset.href, '_blank', 'noopener');
});

function renderWineCards(id, wines) {
    if (!wines) return;
    document.getElementById(id).innerHTML = wines.map(function(w) {
        return '<div class="wine-card">' +
            '<span class="wc-icon">' + w.icon + '</span>' +
            (w.producer ? '<div class="wc-producer">' + w.producer + '</div>' : '') +
            '<h3>' + w.name + '</h3>' +
            '<div>' +
                '<span class="wc-price">' + w.price + '</span>' +
                (w.eco ? '<span class="wc-eco">🌿 Ekološko</span>' : '') +
            '</div>' +
            '<p>' + w.text + '</p>' +
            (w.note ? '<div class="wc-note">' + w.note + '</div>' : '') +
            '</div>';
    }).join('');
}

function renderServiceCards(id, services) {
    if (!services) return;
    document.getElementById(id).innerHTML = services.map(function(s) {
        return '<div class="service-card">' +
            '<span class="card-icon">' + s.icon + '</span>' +
            '<span class="on-request">' + s.tag + '</span>' +
            '<h3>' + s.title + '</h3>' +
            '<p>' + s.text + '</p>' +
            '</div>';
    }).join('');
}

    });
    renderCards('attractions-cards', d.attractions);
    renderCards('food-cards', d.food);
    renderCards('practical-cards', d.practical);
    renderCards('activities-summer-cards', d.activities_summer);
    renderCards('activities-winter-cards', d.activities_winter);
    renderCards('activities-year-cards', d.activities_year);
    renderWineCards('wine-cards', d.wines);
    renderServiceCards('services-cards', d.services);
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + lang).classList.add('active');
}

var auto = navigator.language.slice(0,2);
setLang(['sl','de','hr','en'].indexOf(auto) >= 0 ? auto : 'en');
</script>
